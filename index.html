<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050607" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Silent Cam" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Silent Cam</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="camera-stage" aria-label="カメラ">
        <video id="preview" class="preview" autoplay playsinline muted></video>
        <canvas id="captureCanvas" class="capture-canvas" aria-hidden="true"></canvas>

        <div id="emptyState" class="empty-state">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M15 16.5h6l2.4-3.5h9.1l2.5 3.5h2.5A5.5 5.5 0 0 1 43 22v12.5A5.5 5.5 0 0 1 37.5 40h-27A5.5 5.5 0 0 1 5 34.5V22a5.5 5.5 0 0 1 5.5-5.5H15Z" />
              <circle cx="24" cy="28" r="8" />
            </svg>
          </div>
          <h1>Silent Cam</h1>
          <p id="supportText">カメラを起動すると、音を鳴らさずに写真を保存できます。</p>
          <button id="startButton" class="primary-action" type="button">カメラを起動</button>
        </div>

        <div class="top-bar">
          <button id="flashButton" class="icon-button stack-button" type="button" aria-label="フラッシュ切替" title="フラッシュ切替">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13 2 4 14h7l-1 8 9-13h-7l1-7Z" />
            </svg>
            <span id="flashLabel">オフ</span>
          </button>

          <div id="installStatus" class="install-status" aria-live="polite">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m20 6-11 11-5-5" />
            </svg>
            <span>ホーム画面対応</span>
          </div>

          <div class="top-actions">
            <button id="switchButton" class="icon-button stack-button" type="button" aria-label="カメラ反転" title="カメラ反転">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 9v5a4 4 0 0 1-4 4H7.5" />
                <path d="m18 6 3 3-3 3" />
                <path d="M3 15v-5a4 4 0 0 1 4-4h9.5" />
                <path d="m6 18-3-3 3-3" />
              </svg>
              <span>反転</span>
            </button>
            <button id="downloadLastButton" class="icon-button stack-button" type="button" aria-label="最新写真を写真に保存" title="最新写真を写真に保存">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <path d="M7 10l5 5 5-5" />
                <path d="M12 15V3" />
              </svg>
              <span>写真</span>
            </button>
          </div>
        </div>

        <div class="focus-reticle" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <i></i>
        </div>

        <div class="zoom-control" role="group" aria-label="ズーム">
          <button class="zoom-option" data-zoom="0.5" type="button">.5</button>
          <button class="zoom-option active" data-zoom="1" type="button">1x</button>
          <button class="zoom-option" data-zoom="2" type="button">2</button>
        </div>

        <div id="cameraMessage" class="camera-message" role="status" aria-live="polite"></div>
      </section>

      <section class="control-deck" aria-label="撮影操作">
        <button id="latestThumb" class="latest-thumb" type="button" aria-label="直近の写真を開く">
          <span>未撮影</span>
        </button>
        <button id="shutterButton" class="shutter-button" type="button" aria-label="撮影"></button>
        <button id="modeButton" class="mode-button" type="button" aria-label="撮影後に写真保存を開く" aria-pressed="false">手動</button>
      </section>

      <section class="gallery-panel" aria-label="直近の撮影">
        <div class="panel-handle" aria-hidden="true"></div>
        <header class="gallery-header">
          <h2>直近の撮影</h2>
          <button id="clearButton" type="button">消去</button>
        </header>
        <div id="galleryList" class="gallery-list"></div>
      </section>
    </main>

    <dialog id="reviewDialog" class="review-dialog">
      <div class="review-frame">
        <img id="reviewImage" alt="撮影した写真" />
        <div class="review-actions">
          <button id="closeReviewButton" class="review-icon" type="button" aria-label="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
          <a id="downloadReviewLink" class="review-icon" download="silent-cam.jpg" aria-label="写真に保存">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M7 10l5 5 5-5" />
              <path d="M12 15V3" />
            </svg>
          </a>
        </div>
      </div>
    </dialog>

    <script src="./app.js" type="module"></script>
  </body>
</html>
